name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: windows-x64
            target: node18-win-x64
            output_name: gura-bot-win-x64.exe

          # Linux x64
          - os: ubuntu-latest
            platform: linux-x64
            target: node18-linux-x64
            output_name: gura-bot-linux-x64

          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            platform: macos-arm64
            target: node18-macos-arm64
            output_name: gura-bot-mac-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build binary
        run: pkg src/index.js --targets ${{ matrix.target }} --output ./dist/${{ matrix.output_name }}

      - name: Upload artifact to build job
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: ./dist/

  release:
    name: Create GitHub Release & Upload Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Sync Release Notes to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/sync-releases.js ${{ github.ref_name }}

      - name: Upload Binaries to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} ./dist/* --clobber

  notify:
    name: Notify Discord Status
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Send Discord Webhook Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MENTION_ROLE: ${{ secrets.DISCORD_MENTION_ROLE }}
          DISCORD_EMOJI_ONLINE: ${{ secrets.DISCORD_EMOJI_ONLINE }}
          DISCORD_EMOJI_OFFLINE: ${{ secrets.DISCORD_EMOJI_OFFLINE }}
        run: |
          STATUS="success"
          if [ "${{ needs.build.result }}" != "success" ] || [ "${{ needs.release.result }}" != "success" ]; then
            STATUS="failure"
          fi
          node scripts/notify-discord.js ${{ github.ref_name }} $STATUS
